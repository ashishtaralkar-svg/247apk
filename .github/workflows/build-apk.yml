name: Build APK

# Build the release APK on every push / PR, and attach it to a GitHub Release
# when you push a tag like v1.0.0.
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write   # needed to publish a Release when a v* tag is pushed

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
          cache: true

      - name: Show versions
        run: |
          flutter --version
          java -version

      - name: Get packages
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibrate-timer-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      # When you push a version tag (e.g. v1.0.0), also publish a GitHub Release
      # with the APK attached so anyone can download it directly.
      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
